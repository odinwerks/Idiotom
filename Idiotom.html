::-webkit-scrollbar-thumb { background:var(--scroll-thumb); border-radius:3px; }
#layout { display:flex; width:100vw; height:100vh; overflow:hidden; }
.sidebar {
  width:400px; min-width:400px; flex-shrink:0;
  background:var(--sb-bg); border-right:1px solid var(--sb-border);
  display:flex; flex-direction:column; z-index:10;
  transition:background 0.3s, border-color 0.3s;
}
.sidebar-header { padding:12px 25px 12px; border-bottom:1px solid var(--sb-hdr-border); }
.header-top { display:flex; justify-content:space-between; align-items:center; }
.app-title { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--title-col); font-family:'Space Mono',monospace; margin-bottom:4px; }
.app-name { font-size:24px; font-weight:800; color:var(--name-col); letter-spacing:-0.5px; }
.theme-toggle { width:38px; height:38px; background:var(--badge-bg); border:1px solid var(--badge-border); border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; color:var(--badge-col); transition:all 0.2s ease; }
.theme-toggle:hover { background:var(--btn-hbg); border-color:var(--btn-hborder); }
.sidebar-content { padding:18px 18px; flex:1; display:flex; flex-direction:column; gap:10px; overflow-y:auto; overflow-x:hidden; }
.element-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:15px; padding:15px; display:flex; align-items:center; gap:15px; transition:background 0.3s, border-color 0.3s; }
.element-symbol-badge { width:60px; height:60px; border-radius:12px; background:var(--badge-bg); border:1px solid var(--badge-border); display:flex; align-items:center; justify-content:center; font-size:21px; font-weight:800; color:var(--badge-col); font-family:'Space Mono',monospace; flex-shrink:0; }
.element-info { flex:1; min-width:0; }
.element-name { font-size:16px; font-weight:700; color:var(--elem-name); }
.element-meta { font-size:12px; color:var(--elem-meta); font-family:'Space Mono',monospace; margin-top:3px; }
.element-charge { font-size:12px; margin-top:3px; font-weight:700; }
.charge-neutral { color:#2aaa80; } .charge-pos { color:#ee4444; } .charge-neg { color:#4488ee; }
.section-title { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--sec-title); font-family:'Space Mono',monospace; margin-bottom:10px; }
.param-row { margin-bottom:6px; }
.ctrl-btn { width:35px; height:35px; background:var(--btn-bg); border:1px solid var(--btn-border); color:var(--btn-col); border-radius:8px; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; line-height:1; font-family:'Space Mono',monospace; }
.ctrl-btn:hover { background:var(--btn-hbg); border-color:var(--btn-hborder); color:var(--name-col); }
.ctrl-input { flex:1; background:var(--inp-bg); border:1px solid var(--inp-border); border-radius:8px; padding:5px 8px; font-size:16px; font-weight:700; text-align:center; outline:none; font-family:'Space Mono',monospace; transition:border-color 0.2s; color:inherit; }

.ctrl-input-proton { color:#dd2222 !important; }
body.dark .ctrl-input-neutron { color:#c0c0cc !important; }
body.light .ctrl-input-neutron { color:#666 !important; }
.ctrl-input-electron { color:#2288dd !important; }
/* ── Periodic Table ── */
.pt-grid {
  display:grid;
  grid-template-columns: repeat(18, 1fr);
  grid-template-rows: repeat(10, 1fr);
  gap:0;
  width:100%;
  min-width:0;
}
.pt-cell {
  background:var(--pt-cell);
  border:1px solid var(--pt-cell-border);
  border-radius:2px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:3px;
  transition:all 0.15s ease;
  min-width:0; min-height:0;
  aspect-ratio:1;
  overflow:hidden;
}
.pt-cell:hover { background:var(--pt-cell-hover); border-color:var(--pt-active-border); transform:scale(1.1); z-index:1; }
.pt-cell.active { background:var(--pt-cell-active); border-color:var(--pt-active-border); border-width:2px; box-shadow:0 0 8px rgba(64,96,192,0.3); }
.pt-sym { font-size:12px; font-weight:700; color:var(--pt-sym); line-height:1; font-family:'Space Mono',monospace; }
.pt-row-gap { grid-column:1/-1; height:4px; }

.pt-alkali { border-color:#cc440040; }
.pt-alkaline { border-color:#cc880040; }
.pt-transition { border-color:#44668840; }
.pt-post-trans { border-color:#44884440; }
.pt-metalloid { border-color:#888800; opacity:0.7; }
.pt-nonmetal { border-color:#0055aa40; }
.pt-halogen { border-color:#008844; opacity:0.8; }
.pt-noble { border-color:#8800aa40; }
.pt-lanthanide { border-color:#aa550040; }
.pt-actinide { border-color:#aa440040; }

body.dark .pt-metalloid { border-color:#888800; opacity:1; }
body.dark .pt-halogen { border-color:#008844; opacity:1; }

.shell-row:last-child { border-bottom:none; }
.shell-label { color:var(--st-lbl); font-family:'Space Mono',monospace; min-width:35px; }
.shell-fill-bar { flex:1; height:5px; background:var(--st-bar-bg); border-radius:3px; margin:0 12px; overflow:hidden; }
.shell-fill-inner { height:100%; background:linear-gradient(90deg,#1a60c0,#60c0ff); border-radius:3px; transition:width 0.35s ease; }
body.light .shell-fill-inner { background:linear-gradient(90deg,#3060e0,#60a8ff); }
.shell-count { font-family:'Space Mono',monospace; color:var(--st-cnt); font-size:11px; min-width:48px; text-align:right; }

.canvas-area {
  flex:1; min-width:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
  background:var(--cv-bg); transition:background 0.3s;
}
.canvas-area::before {
  content:''; position:absolute; inset:0;
  background-image:radial-gradient(circle, var(--dot-col) 1px, transparent 1px);
  background-size:38px 38px; opacity:var(--dot-op); pointer-events:none;
}
.atom-svg { width:100%; height:100%; display:block; }
.legend { position:absolute; bottom:20px; right:22px; display:flex; gap:15px; background:var(--leg-bg); border:1px solid var(--leg-border); border-radius:12px; padding:10px 18px; backdrop-filter:blur(8px); transition:background 0.3s, border-color 0.3s; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--leg-col); }
.legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.sidebar-footer { border-top:1px solid var(--sb-hdr-border); }
/* ── Export Modal ── */
.modal-overlay { position:fixed; inset:0; background:#0008; display:flex; align-items:center; justify-content:center; z-index:100; }
.modal-content { background:var(--sb-bg); border:1px solid var(--sb-border); border-radius:15px; padding:25px; width:400px; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:20px; color:var(--name-col); }
.modal-row { margin-bottom:15px; }
.modal-label { display:block; font-size:14px; color:var(--lbl); margin-bottom:5px; }
.modal-input { width:100%; padding:10px; background:var(--inp-bg); border:1px solid var(--inp-border); border-radius:8px; color:var(--name-col); font-family:'Space Mono',monospace; font-size:16px; }
.modal-input:focus { border-color:var(--inp-focus); outline:none; }
.modal-btns { display:flex; gap:8px; margin-top:16px; }
.modal-btn { flex:1; padding:10px; border-radius:8px; border:1px solid var(--btn-border); background:var(--btn-bg); color:var(--btn-col); font-size:14px; cursor:pointer; }
.modal-btn:hover { background:var(--btn-hbg); }
.modal-btn.primary { background:#2040a0; color:#fff; border-color:#2040a0; }
.modal-btn.primary:hover { background:#3050c0; }
.export-btn { width:38px; height:38px; background:var(--badge-bg); border:1px solid var(--badge-border); border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; color:var(--badge-col); transition:all 0.2s ease; }
.export-btn:hover { background:var(--btn-hbg); border-color:var(--btn-hborder); }

                    </div>

              <button className="modal-btn primary" onClick={handleExport}>
                Export {exportFormat.toUpperCase()}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
